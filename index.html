<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lager-Pro: Filiale 77 Hansen</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; margin: 0; padding: 15px; }
        #reader { width: 100%; max-width: 500px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .info-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 15px; width: 100%; max-width: 460px; }
        #instruction { font-weight: bold; color: #d63384; margin-bottom: 15px; text-align: center; }
        h2 { font-size: 18px; color: #333; margin-top: 0; }
        
        .data-row { display: flex; flex-direction: column; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-weight: bold; font-size: 16px; }
        
        #platz-liste { margin-top: 15px; padding: 10px; background: #eef2f7; border-radius: 8px; display: none; width: 100%; box-sizing: border-box; border-left: 4px solid #007bff; }
        .liste-titel { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #007bff; }
        .liste-item { font-size: 13px; display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dotted #ccc; }

        .status-val { font-weight: bold; color: #007bff; }
        #action-buttons { display: none; gap: 10px; margin-top: 20px; width: 100%; max-width: 500px; }
        button { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-einlagern { background-color: #28a745; }
        .btn-auslagern { background-color: #dc3545; }
        .scan-lock { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <h2>Filiale 77 Hansen</h2>
    <div id="reader"></div>

    <div class="info-box">
        <div id="instruction">SCHRITT 1: Artikel scannen</div>
        
        <div class="data-row">
            <span class="data-label">Artikelnummer:</span>
            <input type="text" id="input-ware" placeholder="Scan oder Eingabe..." onchange="manualWareUpdate()">
        </div>

        <div class="data-row">
            <span class="data-label">Lagerplatz:</span>
            <input type="text" id="input-platz" placeholder="Scan oder Eingabe..." onchange="manualPlatzUpdate()">
        </div>

        <div id="platz-liste">
            <div class="liste-titel">Aktueller Inhalt auf Platz:</div>
            <div id="liste-content"></div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 15px;">
            <span>Empf. Platz: <span id="val-info-platz" class="status-val">---</span></span>
            <span>Bestand: <span id="val-bestand" class="status-val">---</span></span>
        </div>
    </div>

    <div id="action-buttons">
        <button class="btn-einlagern" onclick="sendToSheet('EINLAGERN')">EINLAGERN</button>
        <button class="btn-auslagern" onclick="sendToSheet('AUSLAGERN')">AUSLAGERN</button>
    </div>

    <script>
        let ware = "";
        let lagerplatz = "";
        let isScanning = false;
        
        // --- DEINE URL HIER EINTRAGEN ---
        const webAppUrl = "https://script.google.com/macros/s/AKfycbyn9q7vWhWV7ANx1D_XzN-i5_6PyQLDmCPXWpJwkefPXbNevrwx1geYYASjlYij1KwYzQ/exec";

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        function onScanSuccess(decodedText) {
            if (isScanning) return;
            isScanning = true;
            document.body.classList.add('scan-lock');

            if (!ware) {
                document.getElementById('input-ware').value = decodedText;
                manualWareUpdate();
            } else {
                document.getElementById('input-platz').value = decodedText;
                manualPlatzUpdate();
            }

            setTimeout(() => {
                isScanning = false;
                document.body.classList.remove('scan-lock');
            }, 2000); // 2 Sekunden Pause
        }

        async function manualWareUpdate() {
            ware = document.getElementById('input-ware').value.trim();
            if (!ware) return;

            document.getElementById('instruction').innerText = "Suche Artikel...";
            try {
                const response = await fetch(`${webAppUrl}?action=getInfo&ware=${encodeURIComponent(ware)}`);
                const data = await response.json();
                document.getElementById('val-info-platz').innerText = data.platz;
                document.getElementById('val-bestand').innerText = data.bestand;
                document.getElementById('instruction').innerText = "SCHRITT 2: Lagerplatz scannen";
                if(navigator.vibrate) navigator.vibrate(50);
            } catch (err) {
                document.getElementById('val-info-platz').innerText = "Neu";
                document.getElementById('val-bestand').innerText = "0";
            }
        }

        async function manualPlatzUpdate() {
            lagerplatz = document.getElementById('input-platz').value.trim();
            if (!lagerplatz) return;

            try {
                const response = await fetch(`${webAppUrl}?action=getPlatzInfo&platz=${encodeURIComponent(lagerplatz)}`);
                const data = await response.json();
                const listDiv = document.getElementById('liste-content');
                listDiv.innerHTML = "";
                
                if (data.artikel && data.artikel.length > 0) {
                    data.artikel.forEach(item => {
                        listDiv.innerHTML += `<div class="liste-item"><span>${item.name}</span><b>${item.menge} Stk.</b></div>`;
                    });
                    document.getElementById('platz-liste').style.display = "block";
                } else {
                    listDiv.innerHTML = "<em>Platz ist derzeit leer</em>";
                    document.getElementById('platz-liste').style.display = "block";
                }
            } catch (e) { console.log("Fehler bei Abfrage"); }

            if (ware) {
                document.getElementById('action-buttons').style.display = "flex";
                document.getElementById('instruction').innerText = "Bereit zum Buchen";
                document.getElementById('instruction').style.color = "#28a745";
            }
        }

        function sendToSheet(typ) {
            const params = `?platz=${encodeURIComponent(lagerplatz)}&ware=${encodeURIComponent(ware)}&typ=${typ}`;
            document.getElementById('instruction').innerText = "Übertragung läuft...";
            
            fetch(webAppUrl + params, { mode: 'no-cors' })
                .then(() => {
                    alert(`${typ} erfolgreich in Filiale 77 Hansen gebucht!`);
                    resetScanner();
                });
        }

        function resetScanner() {
            ware = ""; lagerplatz = "";
            document.getElementById('input-ware').value = "";
            document.getElementById('input-platz').value = "";
            document.getElementById('val-info-platz').innerText = "---";
            document.getElementById('val-bestand').innerText = "---";
            document.getElementById('platz-liste').style.display = "none";
            document.getElementById('instruction').innerText = "SCHRITT 1: Artikel scannen";
            document.getElementById('instruction').style.color = "#d63384";
            document.getElementById('action-buttons').style.display = "none";
        }

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
